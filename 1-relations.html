<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Відношення</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"><style>* {

        }

        @keyframes slideIn {

        }

        .slide::-webkit-scrollbar {

        .slide h2 {

        }

        .slide h3 {
            color: #4a5568;

        .slide p {

        }

        .slide ul, .slide ol {
            margin-left: 2rem;

        .slide li {

        .slide pre {

        .slide h1 code, .slide h2 code, .slide h3 code {

        /* Повноекранний режим - зберігаємо оригінальний фон */
        #presentation-container:fullscreen {

        #presentation-container:-webkit-full-screen {

#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 17</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script>const slides=["<h1>Відношення</h1>\n<p><strong>Дискретні структури</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🔗 Декартів добуток та бінарне відношення</li>\n<li>📝 Способи задання відношень</li>\n<li>🔍 Властивості бінарних відношень</li>\n<li>⚖️ Відношення еквівалентності та розбиття множини</li>\n<li>🔄 Композиція та обернене відношення</li>\n<li>🛠️ Операції над відношеннями</li>\n<li>✅ Ключові висновки та контрольні питання</li>\n</ol>\n","<h1>🔢 Позначення числових множин</h1>\n<p><strong>Головна ідея:</strong> У дискретній математиці ми постійно працюємо з числовими множинами. Нагадаємо основні позначення.</p>\n<table>\n<thead>\n<tr>\n<th>Позначення</th>\n<th>Назва</th>\n<th>Елементи</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>ℕ</td>\n<td>Натуральні числа</td>\n<td>{1, 2, 3, 4, 5, ...}</td>\n</tr>\n<tr>\n<td>ℕ₀</td>\n<td>Натуральні з нулем</td>\n<td>{0, 1, 2, 3, 4, ...}</td>\n</tr>\n<tr>\n<td>ℤ</td>\n<td>Цілі числа</td>\n<td>{..., -2, -1, 0, 1, 2, ...}</td>\n</tr>\n<tr>\n<td>ℚ</td>\n<td>Раціональні числа</td>\n<td>Числа виду p/q, де p ∈ ℤ, q ∈ ℕ</td>\n</tr>\n<tr>\n<td>ℝ</td>\n<td>Дійсні числа</td>\n<td>Усі точки числової прямої</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Ієрархія множин</strong> <p>ℕ ⊂ ℕ₀ ⊂ ℤ ⊂ ℚ ⊂ ℝ — кожна наступна множина містить попередню.</p>\n</div>\n\n","<h1>🔗 Декартів добуток</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Декартів добуток</strong> множин A і B — це множина всіх впорядкованих пар (a, b), де a ∈ A та b ∈ B:</p>\n<p><strong>A × B = { (a, b) | a ∈ A, b ∈ B }</strong></p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Декартів добуток — основа для означення відношень. Він задає \"простір\" усіх можливих зв'язків між елементами двох множин.</p>\n<h2>📦 Приклад</h2>\n<p>Нехай A = {1, 2}, B = {x, y}. Тоді:</p>\n<p><strong>A × B = { (1, x), (1, y), (2, x), (2, y) }</strong></p>\n<div class=\"note\"><strong>📝 Зверніть увагу</strong> <p>Порядок має значення: A × B ≠ B × A (якщо A ≠ B). Пара (1, x) ≠ (x, 1).</p>\n<p>Кількість елементів: |A × B| = |A| · |B|. У нашому прикладі: 2 · 2 = 4.</p>\n</div>\n\n","<h1>🔗 Бінарне відношення</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Бінарне відношення</strong> R між множинами A і B — це довільна підмножина декартового добутку:</p>\n<p><strong>R ⊆ A × B</strong></p>\n<p>Якщо A = B, то R називається <strong>відношенням на множині A</strong> і R ⊆ A × A = A².</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Відношення формалізує поняття \"зв'язку\" між елементами множин. Запис (a, b) ∈ R або aRb означає, що елемент a пов'язаний з елементом b.</p>\n<h2>📦 Приклади з реального світу</h2>\n<table>\n<thead>\n<tr>\n<th>Відношення</th>\n<th>Множина</th>\n<th>Запис</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>«менше»</td>\n<td>ℤ (цілі числа)</td>\n<td>3 &lt; 5, тобто (3, 5) ∈ R</td>\n</tr>\n<tr>\n<td>«паралельно»</td>\n<td>множина прямих</td>\n<td>a ∥ b, тобто (a, b) ∈ R</td>\n</tr>\n<tr>\n<td>«бути знайомим»</td>\n<td>множина людей</td>\n<td>Аня знайома з Богданом, тобто (Аня, Богдан) ∈ R</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Інтуїція</strong> <p>Відношення — це \"фільтр\" на декартовому добутку: ми обираємо лише ті пари, які задовольняють певну умову.</p>\n</div>\n\n","<h1>📝 Способи задання відношень</h1>\n<p><strong>Головна ідея:</strong> Одне й те саме відношення можна подати різними способами. Вибір способу залежить від задачі.</p>\n<h2>1️⃣ Множинний спосіб — перерахування пар</h2>\n<p>R = { ⟨a, b⟩, ⟨b, b⟩, ⟨b, c⟩, ⟨c, c⟩, ⟨d, d⟩ }</p>\n<h2>2️⃣ Матричний спосіб — матриця відношення</h2>\n<p>Матриця M розміру |A| × |A|, де mᵢⱼ = 1, якщо (aᵢ, aⱼ) ∈ R, інакше mᵢⱼ = 0.</p>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>a</th>\n<th>b</th>\n<th>c</th>\n<th>d</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>a</strong></td>\n<td>0</td>\n<td>1</td>\n<td>0</td>\n<td>0</td>\n</tr>\n<tr>\n<td><strong>b</strong></td>\n<td>0</td>\n<td>1</td>\n<td>1</td>\n<td>0</td>\n</tr>\n<tr>\n<td><strong>c</strong></td>\n<td>0</td>\n<td>0</td>\n<td>1</td>\n<td>0</td>\n</tr>\n<tr>\n<td><strong>d</strong></td>\n<td>0</td>\n<td>0</td>\n<td>0</td>\n<td>1</td>\n</tr>\n</tbody></table>\n<h2>3️⃣ Графічний спосіб — орієнтований граф</h2>\n<p>Елементи множини — <strong>вершини</strong>, пари (a, b) ∈ R — <strong>дуги</strong> (стрілки від a до b). Пара (a, a) зображується <strong>петлею</strong>.</p>\n<p>Граф для відношення R = { ⟨a, b⟩, ⟨b, b⟩, ⟨b, c⟩, ⟨c, c⟩, ⟨d, d⟩ }:</p>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    a((a)) --&gt; b((b))\n    b --&gt; b\n    b --&gt; c((c))\n    c --&gt; c\n    d((d)) --&gt; d\n    style a fill:#e3f2fd,stroke:#1565c0\n    style b fill:#e3f2fd,stroke:#1565c0\n    style c fill:#e3f2fd,stroke:#1565c0\n    style d fill:#e3f2fd,stroke:#1565c0\"><svg id=\"exp-1770573964835-5-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 279.921875px;\" viewBox=\"0 0.05000019073486328 279.921875 206.85702514648438\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1770573964835-5-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1770573964835-5-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1770573964835-5-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1770573964835-5-0 .error-icon{fill:#552222;}#exp-1770573964835-5-0 .error-text{fill:#552222;stroke:#552222;}#exp-1770573964835-5-0 .edge-thickness-normal{stroke-width:1px;}#exp-1770573964835-5-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1770573964835-5-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1770573964835-5-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1770573964835-5-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1770573964835-5-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1770573964835-5-0 .marker{fill:#333333;stroke:#333333;}#exp-1770573964835-5-0 .marker.cross{stroke:#333333;}#exp-1770573964835-5-0 svg{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;}#exp-1770573964835-5-0 p{margin:0;}#exp-1770573964835-5-0 .label{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;color:#333;}#exp-1770573964835-5-0 .cluster-label text{fill:#3 late(1009.140625, 130)\"><rect class=\"basic label-container\" style=\"fill:#f3e5f5 !important;stroke:#7b1fa2 !important\" x=\"-97.953125\" y=\"-24\" width=\"195.90625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-73.953125, -12)\"><rect></rect><foreignObject width=\"147.90625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Антисиметричність</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-TRANS-11\" transform=\"translate(1239.453125, 130)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-82.359375\" y=\"-24\" width=\"164.71875\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-58.359375, -12)\"><rect></rect><foreignObject width=\"116.71875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Транзитивність</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-ATRANS-13\" transform=\"translate(1472.0546875, 130)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-100.2421875\" y=\"-24\" width=\"200.484375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-76.2421875, -12)\"><rect></rect><foreignObject width=\"152.484375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>Антитранзитивність</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<div class=\"note\"><strong>📝 7 властивостей</strong> <p>Відношення може мати будь-яку комбінацію цих властивостей. Деякі з них є взаємовиключними (наприклад, рефлексивність і антирефлексивність), інші можуть поєднуватися.</p>\n</div>\n\n","<h1>🔁 Рефлексивність та антирефлексивність</h1>\n<h2>🟢 Рефлексивність</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p>Відношення R на множині X називається <strong>рефлексивним</strong>, якщо для будь-якого x ∈ X виконується xRx.</p>\n<p>Тобто кожний елемент знаходиться у відношенні R до самого себе.</p>\n</div>\n\n\n\n<p><strong>📦 Приклад:</strong> Відношення «≤» на множині A = {1, 2, 3}: R = {(1,1), (1,2), (1,3), (2,2), (2,3), (3,3)}</p>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>1</th>\n<th>2</th>\n<th>3</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>1</strong></td>\n<td><strong>1</strong></td>\n<td>1</td>\n<td>1</td>\n</tr>\n<tr>\n<td><strong>2</strong></td>\n<td>0</td>\n<td><strong>1</strong></td>\n<td>1</td>\n</tr>\n<tr>\n<td><strong>3</strong></td>\n<td>0</td>\n<td>0</td>\n<td><strong>1</strong></td>\n</tr>\n</tbody></table>\n<p><strong>Ознаки:</strong> діагональ = <strong>1</strong>, у графі — <strong>петля</strong> у кожної вершини.</p>\n<div class=\"note\"><strong>📝 Зверніть увагу</strong> <p>Ми розглядаємо «≤» на маленькій множині {1, 2, 3} для наочності, але ця властивість зберігається і на ℕ, ℤ, ℝ — для будь-якого числа a завжди виконується a ≤ a.</p>\n</div>\n\n\n\n<p><strong>Інші приклади:</strong> «=» на ℝ (a = a для будь-якого числа), «⊆» на множині множин (A ⊆ A для будь-якої множини).</p>\n<h2>🔴 Антирефлексивність</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p>Відношення R на множині X називається <strong>антирефлексивним</strong>, якщо для будь-якого x ∈ X <strong>НЕ</strong> виконується xRx.</p>\n<p>Тобто жоден елемент НЕ знаходиться у відношенні до самого себе.</p>\n</div>\n\n\n\n<p><strong>📦 Приклад:</strong> Відношення «&lt;» (строго менше) на A = {1, 2, 3}: R = {(1,2), (1,3), (2,3)}</p>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>1</th>\n<th>2</th>\n<th>3</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>1</strong></td>\n<td><strong>0</strong></td>\n<td>1</td>\n<td>1</td>\n</tr>\n<tr>\n<td><strong>2</strong></td>\n<td>0</td>\n<td><strong>0</strong></td>\n<td>1</td>\n</tr>\n<tr>\n<td><strong>3</strong></td>\n<td>0</td>\n<td>0</td>\n<td><strong>0</strong></td>\n</tr>\n</tbody></table>\n<p><strong>Ознаки:</strong> діагональ = <strong>0</strong>, у графі — <strong>жодних петель</strong>.</p>\n<p><strong>Інші приклади:</strong> «бути батьком» на множині людей.</p>\n<div class=\"warning\"><strong>⚠️ Увага</strong> <p>Рефлексивність та антирефлексивність — <strong>не</strong> протилежності! Відношення може бути ні рефлексивним, ні антирефлексивним (наприклад, якщо петлі є лише у частини вершин).</p>\n</div>\n\n","<h1>🔄 Симетричність та асиметричність</h1>\n<h2>🟢 Симетричність</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p>Відношення R називається <strong>симетричним</strong>, якщо для будь-якої пари (x₁, x₂) ∈ X² з x₁Rx₂ виходить x₂Rx₁.</p>\n<p>Тобто відношення завжди виконується в обидві сторони, або не виконується взагалі.</p>\n</div>\n\n\n\n<p><strong>📦 Приклад:</strong> «бути знайомим» на A = {a, b, c}: R = {(a,b), (b,a), (b,c), (c,b)}</p>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>a</th>\n<th>b</th>\n<th>c</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>a</strong></td>\n<td>0</td>\n<td>1</td>\n<td>0</td>\n</tr>\n<tr>\n<td><strong>b</strong></td>\n<td>1</td>\n<td>0</td>\n<td>1</td>\n</tr>\n<tr>\n<td><strong>c</strong></td>\n<td>0</td>\n<td>1</td>\n<td>0</td>\n</tr>\n</tbody></table>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    a((a)) &lt;--&gt; b((b))\n    b &lt;--&gt; c((c))\n    style a fill:#e8f5e9,stroke:#388e3c\n    style b fill:#e8f5e9,stroke:#388e3c\n    style c fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1770573964866-8-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 178.671875px;\" viewBox=\"0 -1.2421875 178.671875 40\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-177057 e(-4.3203125, -12)\"><rect></rect><foreignObject width=\"8.640625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>c</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<p><strong>Ознаки:</strong> матриця симетрична відносно діагоналі (mᵢⱼ = mⱼᵢ), у графі дуги завжди парні.</p>\n<p><strong>Інші приклади:</strong> «=» на ℤ, «паралельно» на множині прямих.</p>\n<h2>🔴 Асиметричність</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p>Відношення R називається <strong>асиметричним</strong>, якщо для пари (x₁, x₂) ∈ X² із x₁Rx₂ виходить, що <strong>НЕ</strong> виконується x₂Rx₁.</p>\n<p>Тобто відношення виконується лише в один бік, або не виконується взагалі.</p>\n</div>\n\n\n\n<p><strong>📦 Приклад:</strong> «&lt;» на A = {1, 2, 3}: якщо 1 &lt; 2, то НЕ 2 &lt; 1. Граф має лише односторонні дуги і жодних петель.</p>\n<p><strong>Інші приклади:</strong> «бути батьком» на множині людей.</p>\n<div class=\"note\"><strong>📝 Зв'язок</strong> <p>Асиметричне відношення завжди є антирефлексивним (якщо xRx, то одночасно мало б бути «НЕ xRx» — суперечність).</p>\n</div>\n\n","<h1>🛡️ Антисиметричність</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p>Відношення R називається <strong>антисиметричним</strong>, якщо з x₁Rx₂ і x₂Rx₁ виходить, що x₁ = x₂.</p>\n<p>Тобто два <strong>різних</strong> елементи не можуть бути одночасно пов'язані в обох напрямках.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Антисиметричність дозволяє петлі (xRx), але забороняє \"двосторонні зв'язки\" між різними елементами.</p>\n<p><strong>📦 Приклад:</strong> Відношення «≤» на A = {1, 2, 3}:</p>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>1</th>\n<th>2</th>\n<th>3</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>1</strong></td>\n<td>1</td>\n<td>1</td>\n<td>1</td>\n</tr>\n<tr>\n<td><strong>2</strong></td>\n<td>0</td>\n<td>1</td>\n<td>1</td>\n</tr>\n<tr>\n<td><strong>3</strong></td>\n<td>0</td>\n<td>0</td>\n<td>1</td>\n</tr>\n</tbody></table>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    1((1)) --&gt; 1\n    1 --&gt; 2((2))\n    1 --&gt; 3((3))\n    2 --&gt; 2\n    2 --&gt; 3\n    3 --&gt; 3\n    style 1 fill:#f3e5f5,stroke:#7b1fa2\n    style 2 fill:#f3e5f5,stroke:#7b1fa2\n    style 3 fill:#f3e5f5,stroke:#7b1fa2\"><svg id=\"exp-1770573964871-9-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 278.421875px;\" viewBox=\"0 -39.68899917602539 278.421875 217.11557006835938\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1770573964871-9-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1770573964871-9-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1770573964871-9-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1770573964871-9-0 .error-icon{fill:#552222;}#exp-1770573964871-9-0 .error-text{fill:#552222;stroke:#552222;}#exp-1770573964871-9-0 .edge-thickness-normal{stroke-width:1px;}#exp-1770573964871-9-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1770573964871-9-0 .edge-pattern-solid{stroke-dasharray:0;}#exp-1770573964871-9-0 .edge-thickness-invisible{stroke-width:0;fill:none;}#exp-1770573964871-9-0 .edge-pattern-dashed{stroke-dasharray:3;}#exp-1770573964871-9-0 .edge-pattern-dotted{stroke-dasharray:2;}#exp-1770573964871-9-0 .marker{fill:#333333;stroke:#333333;}#exp-1770573964871-9-0 .marker.cross{stroke:#333333;}#exp-1770573964871-9-0 svg{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;}#exp-177057396  width=\"0\" height=\"0\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 10px; text-align: center;\"><span class=\"nodeLabel \"></span></div></foreignObject></g></g><g class=\"label edgeLabel\" id=\"3---3---1\" transform=\"translate(220.22187500074506, 169.32656250335276)\"><rect width=\"0.1\" height=\"0.1\"></rect><g class=\"label\" style=\"\" transform=\"translate(0, 0)\"><rect></rect><foreignObject width=\"0\" height=\"0\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 10px; text-align: center;\"><span class=\"nodeLabel \"></span></div></foreignObject></g></g><g class=\"label edgeLabel\" id=\"3---3---2\" transform=\"translate(270.3218750022352, 151.80156250298023)\"><rect width=\"0.1\" height=\"0.1\"></rect><g class=\"label\" style=\"\" transform=\"translate(0, 0)\"><rect></rect><foreignObject width=\"0\" height=\"0\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 10px; text-align: center;\"><span class=\"nodeLabel \"></span></div></foreignObject></g></g></g></g></g></svg></div>\n<p>Між різними елементами дуги йдуть лише в один бік (1→2, але не 2→1). Петлі дозволені.</p>\n<p><strong>Інші приклади:</strong></p>\n<ul>\n<li>«⊆» на множині множин: якщо A ⊆ B і B ⊆ A, то A = B</li>\n</ul>\n<h2>🔀 Порівняння симетричності, асиметричності та антисиметричності</h2>\n<table>\n<thead>\n<tr>\n<th>Властивість</th>\n<th>Суть</th>\n<th>Петлі</th>\n<th>Двосторонні дуги між різними</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Симетричність</td>\n<td>xRy → yRx</td>\n<td>Не обмежуються</td>\n<td>Якщо є дуга — обов'язково парна</td>\n</tr>\n<tr>\n<td>Асиметричність</td>\n<td>xRy → ¬yRx</td>\n<td>❌ Заборонені</td>\n<td>❌ Заборонені</td>\n</tr>\n<tr>\n<td>Антисиметричність</td>\n<td>xRy ∧ yRx → x=y</td>\n<td>✅ Дозволені</td>\n<td>❌ Заборонені</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Типова помилка</strong> <p>Антисиметричність ≠ \"не симетричність\". Відношення може бути одночасно симетричним і антисиметричним (наприклад, відношення «=»).</p>\n</div>\n\n","<h1>🔗 Транзитивність та антитранзитивність</h1>\n<h2>🟢 Транзитивність</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p>Відношення R називається <strong>транзитивним</strong>, якщо з x₁Rx₂ і x₂Rx₃ виходить x₁Rx₃.</p>\n<p>Тобто зв'язок \"передається по ланцюжку\".</p>\n</div>\n\n\n\n<p><strong>📦 Приклад:</strong> Відношення «&lt;» на A = {1, 2, 3}: якщо 1 &lt; 2 і 2 &lt; 3, то 1 &lt; 3 ✅</p>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    1((1)) --&gt; 2((2))\n    2 --&gt; 3((3))\n    1 --&gt; 3\n    style 1 fill:#e3f2fd,stroke:#1565c0\n    style 2 fill:#e3f2fd,stroke:#1565c0\n    style 3 fill:#e3f2fd,stroke:#1565c0\"><svg id=\"exp-1770573964882-10-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 178.171875px;\" viewBox=\"0 -1.328125 178.171875 73.67212677001953\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1770573964882-10-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1770573964882-10-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1770573964882-10-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1770573964882-10-0 .error-icon{fill:#552222;}#exp-1770573964882-10-0 .error-text{fill:#552222;stroke:#552222;}#exp-1770573964882-10-0 .edge-thickness-normal{stroke-width:1px;}#exp-1770573964882-10-0 .edge-thickness-thick{stroke-width:3.5px;}#exp-1770573964882-10-0 .edge-pattern-solid{stroke-dasharray:0;}#e ct></g><g class=\"edgeLabel\"><g class=\"label\" data-id=\"L_1_2_0\" transform=\"translate(0, 0)\"><text y=\"-10.1\"><tspan class=\"text-outer-tspan\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\"></tspan></text></g></g><g class=\"edgeLabel\"><g class=\"label\" data-id=\"L_2_3_0\" transform=\"translate(0, 0)\"><text y=\"-10.1\"><tspan class=\"text-outer-tspan\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\"></tspan></text></g></g><g class=\"edgeLabel\"><g class=\"label\" data-id=\"L_1_3_0\" transform=\"translate(0, 0)\"><text y=\"-10.1\"><tspan class=\"text-outer-tspan\" x=\"0\" y=\"-0.1em\" dy=\"1.1em\"></tspan></text></g></g></g><g class=\"nodes\"><g class=\"node default  \" id=\"flowchart-1-0\" transform=\"translate(17.5546875, 41.5078125)\"><circle class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" r=\"9.5546875\" cx=\"0\" cy=\"0\"></circle><g class=\"label\" style=\"\" transform=\"translate(-3.5546875, -12)\"><rect></rect><foreignObject width=\"7.109375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>1</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-2-1\" transform=\"translate(87.78125, 18.671875)\"><circle class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" r=\"10.671875\" cx=\"0\" cy=\"0\"></circle><g class=\"label\" style=\"\" transform=\"translate(-4.671875, -12)\"><rect></rect><foreignObject width=\"9.34375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>2</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-3-3\" transform=\"translate(159.3125, 41.5078125)\"><circle class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" r=\"10.859375\" cx=\"0\" cy=\"0\"></circle><g class=\"label\" style=\"\" transform=\"translate(-4.859375, -12)\"><rect></rect><foreignObject width=\"9.71875\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>3</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<p>Дуга 1→3 — це \"транзитивне замикання\": з 1 &lt; 2 і 2 &lt; 3 випливає 1 &lt; 3.</p>\n<p><strong>Інші приклади:</strong> «=» на ℝ, «≤» на ℤ, «⊆» на множині множин, «жити в одному місті» на множині людей.</p>\n<h2>🔴 Антитранзитивність</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p>Відношення R називається <strong>антитранзитивним</strong>, якщо з x₁Rx₂ і x₂Rx₃ виходить, що <strong>НЕ</strong> виконується x₁Rx₃.</p>\n</div>\n\n\n\n<p><strong>📦 Приклад:</strong> «бути сином» — якщо A є сином B, а B є сином C, то A <strong>НЕ</strong> є сином C (A є онуком C).</p>\n<div class=\"tip\"><strong>💡 Як перевірити транзитивність на матриці та графі</strong> <p><strong>Граф:</strong> якщо є дуги a→b і b→c, то має існувати й пряма дуга a→c.</p>\n<p><strong>Матриця:</strong> якщо M² (булевий добуток) містить 1 там, де M містить 0, — відношення <strong>не</strong> транзитивне.</p>\n</div>\n\n","<h1>⚖️ Відношення еквівалентності</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p>Відношення R на множині X називається <strong>відношенням еквівалентності</strong>, якщо воно одночасно:</p>\n<ol>\n<li>✅ <strong>Рефлексивне</strong> — кожен елемент еквівалентний самому собі (aRa)</li>\n<li>✅ <strong>Симетричне</strong> — якщо aRb, то bRa</li>\n<li>✅ <strong>Транзитивне</strong> — якщо aRb і bRc, то aRc</li>\n</ol>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Еквівалентність — це узагальнення поняття \"рівності\". Вона розбиває множину на групи нерозрізнювальних елементів. Для позначення еквівалентності часто використовують символ <strong>~</strong> (тильда): a ~ b.</p>\n<h2>📦 Детальний приклад — «навчатися в одній групі»</h2>\n<p>Нехай X = {Аня, Богдан, Віка, Гриша, Даша, Єва} — студенти, розподілені по групах:</p>\n<ul>\n<li>Група 1: Аня, Богдан, Віка</li>\n<li>Група 2: Гриша, Даша, Єва</li>\n</ul>\n<p>Відношення R: aRb ⟺ a та b навчаються в одній групі.</p>\n<p><strong>Перевіримо три властивості:</strong></p>\n<ul>\n<li>🔁 <strong>Рефлексивне:</strong> кожен студент навчається в одній групі з самим собою — aRa ✅</li>\n<li>🔄 <strong>Симетричне:</strong> якщо Аня в одній групі з Богданом, то й Богдан в одній групі з Анею — aRb → bRa ✅</li>\n<li>🔗 <strong>Транзитивне:</strong> якщо Аня в одній групі з Богданом, і Богдан в одній групі з Вікою, то Аня в одній групі з Вікою — aRb ∧ bRc → aRc ✅</li>\n</ul>\n<p><strong>Результат:</strong> R — відношення еквівалентності ✅</p>\n","<h1>📦 Класи еквівалентності та розбиття</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Клас еквівалентності</strong> елемента a — це множина всіх елементів, еквівалентних a:</p>\n<p><strong>[a] = { x ∈ X | aRx }</strong></p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Відношення еквівалентності завжди породжує <strong>розбиття</strong> множини на непересічні класи, і навпаки.</p>\n<h2>📦 Продовження прикладу — класи та розбиття</h2>\n<p>З прикладу «навчатися в одній групі» для X = {Аня, Богдан, Віка, Гриша, Даша, Єва}:</p>\n<table>\n<thead>\n<tr>\n<th>Клас</th>\n<th>Елементи</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>[Аня]</td>\n<td>{Аня, Богдан, Віка}</td>\n</tr>\n<tr>\n<td>[Гриша]</td>\n<td>{Гриша, Даша, Єва}</td>\n</tr>\n</tbody></table>\n<p>Ці два класи утворюють <strong>розбиття</strong> множини X: {Аня, Богдан, Віка} ∪ {Гриша, Даша, Єва} = X, і класи не перетинаються.</p>\n<h2>📦 Ще приклади еквівалентностей</h2>\n<table>\n<thead>\n<tr>\n<th>Відношення</th>\n<th>Множина</th>\n<th>Класи еквівалентності</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>«=» (рівність)</td>\n<td>ℤ</td>\n<td>Кожен елемент — окремий клас: {1}, {2}, {3}, ...</td>\n</tr>\n<tr>\n<td>«паралельність»</td>\n<td>Множина прямих</td>\n<td>Прямі з однаковим напрямком утворюють клас</td>\n</tr>\n<tr>\n<td>«однакова група крові»</td>\n<td>Множина людей</td>\n<td>4 класи: I, II, III, IV група</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Фундаментальна теорема</strong> <p><strong>Еквівалентність ↔ Розбиття.</strong> Кожне відношення еквівалентності однозначно визначає розбиття і навпаки. Це один з ключових результатів теорії множин.</p>\n</div>\n\n","<h1>🔄 Композиція та обернене відношення</h1>\n<h2>🔗 Композиція відношень</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Композицією</strong> відношень R і S називають відношення R∘S, таке що:</p>\n<p><strong>R∘S = { (a, c) | ∃ b: (a, b) ∈ R та (b, c) ∈ S }</strong></p>\n</div>\n\n\n\n<p><strong>📦 Приклад:</strong> A = {1, 2, 3}, R = {(1,2), (2,3)}, S = {(2,1), (3,2)}.</p>\n<p>R∘S: шукаємо пари (a, c) через проміжний елемент b:</p>\n<ul>\n<li>(1, 2) ∈ R і (2, 1) ∈ S → <strong>(1, 1) ∈ R∘S</strong></li>\n<li>(2, 3) ∈ R і (3, 2) ∈ S → <strong>(2, 2) ∈ R∘S</strong></li>\n</ul>\n<div class=\"tip\"><strong>💡 Матричний метод</strong> <p>Композиція обчислюється як <strong>булевий добуток матриць</strong> (∧ замість ·, ∨ замість +).</p>\n</div>\n\n\n\n<h2>🔃 Обернене відношення</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>R⁻¹ = { (y, x) | (x, y) ∈ R }</strong> — всі пари \"перевертаються\".</p>\n</div>\n\n\n\n<p><strong>📦 Приклад:</strong> Нехай R = {(1, 2), (1, 3), (2, 3)} (відношення «&lt;» на {1, 2, 3}).</p>\n<p>Тоді R⁻¹ = {(2, 1), (3, 1), (3, 2)} — це відношення «&gt;».</p>\n<table>\n<thead>\n<tr>\n<th>Відношення R</th>\n<th>Обернене R⁻¹</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>«&lt;» (менше)</td>\n<td>«&gt;» (більше)</td>\n</tr>\n<tr>\n<td>«≤» (менше або дорівнює)</td>\n<td>«≥» (більше або дорівнює)</td>\n</tr>\n<tr>\n<td>«бути батьком»</td>\n<td>«бути дитиною»</td>\n</tr>\n</tbody></table>\n<p><strong>Як отримати:</strong> множина пар — поміняти місцями; матриця — транспонувати (Mᵀ); граф — змінити напрямок дуг.</p>\n","<h1>🛠️ Операції над відношеннями</h1>\n<p><strong>Головна ідея:</strong> Оскільки відношення — це множини пар, до них застосовні всі теоретико-множинні операції.</p>\n<table>\n<thead>\n<tr>\n<th>Операція</th>\n<th>Позначення</th>\n<th>Означення</th>\n<th>Суть</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🔵 Перетин</td>\n<td>P ∩ Q</td>\n<td>(x,y) ∈ P <strong>та</strong> (x,y) ∈ Q</td>\n<td>Спільні пари</td>\n</tr>\n<tr>\n<td>🟢 Об'єднання</td>\n<td>P ∪ Q</td>\n<td>(x,y) ∈ P <strong>або</strong> (x,y) ∈ Q</td>\n<td>Усі пари з обох</td>\n</tr>\n<tr>\n<td>🟠 Різниця</td>\n<td>P \\ Q</td>\n<td>(x,y) ∈ P <strong>та</strong> (x,y) ∉ Q</td>\n<td>Пари лише з P</td>\n</tr>\n<tr>\n<td>🟣 Симетрична різниця</td>\n<td>P △ Q</td>\n<td>(P \\ Q) ∪ (Q \\ P)</td>\n<td>Пари лише в одному</td>\n</tr>\n<tr>\n<td>🔴 Доповнення</td>\n<td>P̄</td>\n<td>(x,y) ∉ P</td>\n<td>Усі пари, що НЕ в P</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Приклад</strong> <p>Якщо P = «≤» і Q = «≥» на {1, 2, 3}, то P ∩ Q = «=» (рівність) — спільні пари є тільки діагональні.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми вивчили:</strong></p>\n<ol>\n<li><p>🔗 <strong>Бінарне відношення</strong> — це підмножина декартового добутку A × A, що формалізує зв'язки між елементами</p>\n</li>\n<li><p>📝 <strong>Способи задання:</strong> множинний, матричний та графічний — три основні інструменти для роботи з відношеннями</p>\n</li>\n<li><p>🔍 <strong>7 властивостей</strong> (рефлексивність, антирефлексивність, симетричність, асиметричність, антисиметричність, транзитивність, антитранзитивність) — характеризують поведінку відношення</p>\n</li>\n<li><p>⚖️ <strong>Еквівалентність</strong> (рефлексивне + симетричне + транзитивне) розбиває множину на класи еквівалентності</p>\n</li>\n<li><p>🔄 <strong>Композиція</strong> відношень — послідовне застосування; <strong>обернене</strong> відношення — зміна напрямку зв'язків</p>\n</li>\n<li><p>🛠️ <strong>Операції</strong> над відношеннями зводяться до теоретико-множинних операцій над множинами пар</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Що таке бінарне відношення на множині? Як воно пов'язане з декартовим добутком?</p>\n</li>\n<li><p>🤔 Якими способами можна задати відношення? Який спосіб є найзручнішим для перевірки властивостей і чому?</p>\n</li>\n<li><p>🤔 Чим відрізняється антисиметричність від асиметричності? Наведіть приклад відношення, яке є антисиметричним, але не асиметричним.</p>\n</li>\n<li><p>🤔 Чи може відношення бути одночасно симетричним і антисиметричним? Якщо так, наведіть приклад.</p>\n</li>\n<li><p>🤔 Які три властивості має відношення еквівалентності? Поясніть зв'язок між еквівалентністю та розбиттям множини.</p>\n</li>\n<li><p>🤔 Як обчислити композицію двох відношень за допомогою їх матриць?</p>\n</li>\n<li><p>🤔 Що таке обернене відношення? Як його отримати з матриці?</p>\n</li>\n</ol>\n"];let currentSlideIndex=0;
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
