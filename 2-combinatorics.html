нації з повтореннями</li>\n<li>✅ Ключові висновки та контрольні питання</li>\n</ol>\n","<h1>🔢 Комбінаторика: що це і навіщо?</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Комбінаторика</strong> — розділ дискретної математики, що вивчає методи підрахунку кількості способів вибору, розміщення та впорядкування елементів скінченних множин відповідно до заданих правил і обмежень.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Комбінаторика відповідає на питання «скільки існує способів?» — не перераховуючи їх усі вручну, а виводячи формули.</p>\n<h2>🌍 Де це потрібно в програмуванні?</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    C[🔢 Комбінаторика] --&gt; A[🔐 Криптографія]\n    C --&gt; B[🧪 Тестування ПЗ]\n    C --&gt; D[📊 Аналіз алгоритмів]\n    C --&gt; E[🤖 Машинне навчання]\n    C --&gt; F[🎮 Генерація контенту]\n    style C fill:#fff9c4,stroke:#f9a825\n    style A fill:#e3f2fd,stroke:#1565c0\n    style B fill:#e8f5e9,stroke:#388e3c\n    style D fill:#fce4ec,stroke:#c2185b\n    style E fill:#f3e5f5,stroke:#7b1fa2\n    style F fill:#fff3e0,stroke:#ef6c00\"><svg id=\"exp-1772386727625-2-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 471.90625px;\" viewBox=\"0 0 471.90625 456\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1772386727625-2-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1772386727625-2-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1772386727625-2-0 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#exp-1772386727625-2-0 .error-icon{fill:#552222;}#exp-1772386727625-2-0 .error-text{fill:#552 54.2109375, 228)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-105.1328125\" y=\"-24\" width=\"210.265625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-81.1328125, -12)\"><rect></rect><foreignObject width=\"162.265625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>📊 Аналіз алгоритмів</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-E-7\" transform=\"translate(354.2109375, 326)\"><rect class=\"basic label-container\" style=\"fill:#f3e5f5 !important;stroke:#7b1fa2 !important\" x=\"-109.3515625\" y=\"-24\" width=\"218.703125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-85.3515625, -12)\"><rect></rect><foreignObject width=\"170.703125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🤖 Машинне навчання</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-F-9\" transform=\"translate(354.2109375, 424)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-109.6953125\" y=\"-24\" width=\"219.390625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-85.6953125, -12)\"><rect></rect><foreignObject width=\"171.390625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🎮 Генерація контенту</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<div class=\"note\"><strong>📝 Практичний контекст</strong> <p>Скільки паролів можна скласти з 8 символів? Скільки тестових сценаріїв покриє всі комбінації входів? Скільки способів призначити задачі команді? — Це все комбінаторні задачі.</p>\n</div>\n\n","<h1>➕ Правило суми та правило добутку</h1>\n<h2>📐 Правило суми</h2>\n<div class=\"info\"><strong>ℹ️ Формулювання</strong> <p>Якщо є кілька <strong>взаємовиключних</strong> варіантів дій (не можуть відбутись одночасно), і перший варіант можна виконати <strong>m</strong> способами, другий — <strong>n</strong> способами (і т.д.), то вибрати <strong>один</strong> з цих варіантів можна <strong>m + n + ...</strong> способами.</p>\n</div>\n\n\n\n<p><strong>Інтуїція:</strong> Ми обираємо АБО A, АБО B — тому складаємо.</p>\n<div class=\"tip\"><strong>💡 Приклад</strong> <p>У меню є <strong>5 перших страв</strong> і <strong>4 десерти</strong>. Відвідувач хоче замовити або першу страву, або десерт. Загальна кількість варіантів вибору: <strong>5 + 4 = 9</strong>.</p>\n</div>\n\n\n\n<h2>✖️ Правило добутку</h2>\n<div class=\"info\"><strong>ℹ️ Формулювання</strong> <p>Якщо дію складається з <strong>двох незалежних етапів</strong>: перший виконується <strong>m</strong> способами, другий — <strong>n</strong> способами, то вся дія виконується <strong>m · n</strong> способами.</p>\n</div>\n\n\n\n<p><strong>Інтуїція:</strong> Кожний вибір на першому кроці поєднується з кожним вибором на другому — тому множимо.</p>\n<div class=\"tip\"><strong>💡 Приклад</strong> <p>Студент обирає футболку (є <strong>3 кольори</strong>) і джинси (є <strong>4 фасони</strong>). Загальна кількість варіантів одягу: <strong>3 · 4 = 12</strong>.</p>\n</div>\n\n\n\n<h2>🧩 Задача на закріплення</h2>\n<blockquote>\n<p><strong>Умова:</strong> Щоб дістатися з міста A до міста C через місто B, можна скористатися <strong>3 маршрутами</strong> від A до B і <strong>4 маршрутами</strong> від B до C. Скільки різних шляхів з A до C існує?</p>\n</blockquote>\n<p><strong>Розв'язання:</strong> Вибір першого відрізку не залежить від вибору другого — це два незалежні кроки, застосовуємо правило добутку:</p>\n<p><strong>3 · 4 = 12 різних шляхів</strong> ✅</p>\n","<h1>🔀 Перестановки без повторень</h1>\n<h2>📖 Теорія</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Перестановка</strong> з n елементів — це будь-яке впорядкування всіх n різних елементів у ряд. Кількість перестановок позначається P(n).</p>\n</div>\n\n\n\n<p><strong>Чому формула виглядає саме так?</strong></p>\n<p>Уявімо, що розставляємо n об'єктів на n місць:</p>\n<ul>\n<li>На <strong>1-ше місце</strong> можна поставити будь-який з <strong>n</strong> елементів</li>\n<li>На <strong>2-ге місце</strong> — будь-який з <strong>n−1</strong> решти</li>\n<li>На <strong>3-тє місце</strong> — будь-який з <strong>n−2</strong> решти</li>\n<li>...і так далі до останнього місця, де залишається рівно <strong>1</strong> елемент</li>\n</ul>\n<p>За правилом добутку: <strong>P(n) = n · (n−1) · (n−2) · ... · 2 · 1 = n!</strong></p>\n<p><span><span class=\"katex-display\"><span class=\"katex\"><span class=\"katex-mathml\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><mi>P</mi><mo stretchy=\"false\">(</mo><mi>n</mi><mo stretchy=\"false\">)</mo><mo>=</mo><mi>n</mi><mo stretchy=\"false\">!</mo></mrow><annotation encoding=\"application/x-tex\">P(n) = n!</annotation></semantics></math></span><span class=\"katex-html\" aria-hidden=\"true\"><span class=\"base\"><span class=\"strut\" style=\"height: 1em; vertical-align: -0.25em;\"></span><span class=\"mord mathnormal\" style=\"margin-right: 0.1389em;\">P</span><span class=\"mopen\">(</span><span class=\"mord mathnormal\">n</span><span class=\"mclose\">)</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 0.6944em;\"></span><span class=\"mord mathnormal\">n</span><span class=\"mclose\">!</span></span></span></span></span></span></p>\n<div class=\"note\"><strong>📝 Факторіал</strong> <p><strong>n!</strong> (n-факторіал) = добуток усіх натуральних чисел від 1 до n. Особливий випадок: <strong>0! = 1</strong> (є рівно один спосіб упорядкувати порожню множину).</p>\n</div>\n\n\n\n<h2>🧩 Задача</h2>\n<blockquote>\n<p><strong>Умова:</strong> На книжковій полиці стоять <strong>5 різних книжок</strong>. Скількома способами їх можна розставити?</p>\n</blockquote>\n<p><strong>Розв'язання:</strong></p>\n<p>Маємо n = 5 різних книжок, потрібно впорядкувати всі — це перестановка:</p>\n<p><strong>P(5) = 5! = 5 · 4 · 3 · 2 · 1 = 120 способів</strong> ✅</p>\n<p><strong>Перевірка інтуїції:</strong> На першу позицію можна поставити будь-яку з 5 книжок, на другу — будь-яку з 4 решти, і так далі до останньої позиції, де залишається 1 книжка. 5 · 4 · 3 · 2 · 1 = 120.</p>\n","<h1>🔁 Перестановки з повтореннями</h1>\n<h2>📖 Теорія</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Перестановка з повтореннями</strong> — це впорядкування n елементів, серед яких є однакові: k₁ елементів першого типу, k₂ — другого, ..., km — m-го типу (де k₁ + k₂ + ... + km = n).</p>\n</div>\n\n\n\n<p><strong>Чому ділимо на факторіали однакових елементів?</strong></p>\n<p>Якщо всі n елементів різні — маємо n! перестановок. Але якщо k₁ елементів однакові, то перестановки між собою цих k₁ елементів <strong>не дають нових</strong> впорядкувань — ми їх «зайво порахували» k₁! разів. Тому ділимо.</p>\n<p><span><span class=\"katex-display\"><span class=\"katex\"><span class=\"katex-mathml\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><mi>P</mi><mo stretchy=\"false\">(</mo><mi>n</mi><mo separator=\"true\">;</mo><msub><mi>k</mi><mn>1</mn></msub><mo separator=\"true\">,</mo><msub><mi>k</mi><mn>2</mn></msub><mo separator=\"true\">,</mo><mo>…</mo><mo separator=\"true\">,</mo><msub><mi>k</mi><mi>m</mi></msub><mo stretchy=\"false\">)</mo><mo>=</mo><mfrac><mrow><mi>n</mi><mo stretchy=\"false\">!</mo></mrow><mrow><msub><mi>k</mi><mn>1</mn></msub><mo stretchy=\"false\">!</mo><mo>⋅</mo><msub><mi>k</mi><mn>2</mn></msub><mo stretchy=\"false\">!</mo><mo>⋅</mo><mo>…</mo><mo>⋅</mo><msub><mi>k</mi><mi>m</mi></msub><mo stretchy=\"false\">!</mo></mrow></mfrac></mrow><annotation encoding=\"application/x-tex\">P(n; k_1, k_2, \\ldots, k_m) = \\frac{n!}{k_1! \\cdot k_2! \\cdot \\ldots \\cdot k_m!}</annotation></semantics></math></span><span class=\"katex-html\" aria-hidden=\"true\"><span class=\"base\"><span class=\"strut\" style=\"height: 1em; vertical-align: -0.25em;\"></span><span class=\"mord mathnormal\" style=\"margin-right: 0.1389em;\">P</span><span class=\"mopen\">(</span><span class=\"mord mathnormal\">n</span><span class=\"mpunct\">;</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord\"><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"msupsub\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.3011em;\"><span class=\"\" style=\"top: -2.55em; margin-left: -0.0315em; margin-right: 0.05em;\"><span class=\"pstrut\" style=\"height: 2.7em;\"></span><span class=\"sizing reset-size6 size3 mtight\"><span class=\"mord mtight\">1</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.15em;\"><span class=\"\"></span></span></span></span></span></span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord\"><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"msupsub\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.3011em;\"><span class=\"\" style=\"top: -2.55em; margin-left: -0.0315em; margin-right: 0.05em;\"><span class=\"pstrut\" style=\"height: 2.7em;\"></span><span class=\"sizing reset-size6 size3 mtight\"><span class=\"mord mtight\">2</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.15em;\"><span class=\"\"></span></span></span></span></span></span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"minner\">…</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord\"><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"msupsub\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.1514em;\"><span class=\"\" style=\"top: -2.55em; margin-left: -0.0315em; margin-right: 0.05em;\"><span class=\"pstrut\" style=\"height: 2.7em;\"></span><span class=\"sizing reset-size6 size3 mtight\"><span class=\"mord mathnormal mtight\">m</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.15em;\"><span class=\"\"></span></span></span></span></span></span><span class=\"mclose\">)</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 2.2074em; vertical-align: -0.836em;\"></span><span class=\"mord\"><span class=\"mopen nulldelimiter\"></span><span class=\"mfrac\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 1.3714em;\"><span class=\"\" style=\"top: -2.314em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\"><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"msupsub\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.3011em;\"><span class=\"\" style=\"top: -2.55em; margin-left: -0.0315em; margin-right: 0.05em;\"><span class=\"pstrut\" style=\"height: 2.7em;\"></span><span class=\"sizing reset-size6 size3 mtight\"><span class=\"mord mtight\">1</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.15em;\"><span class=\"\"></span></span></span></span></span></span><span class=\"mclose\">!</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mord\"><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"msupsub\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.3011em;\"><span class=\"\" style=\"top: -2.55em; margin-left: -0.0315em; margin-right: 0.05em;\"><span class=\"pstrut\" style=\"height: 2.7em;\"></span><span class=\"sizing reset-size6 size3 mtight\"><span class=\"mord mtight\">2</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.15em;\"><span class=\"\"></span></span></span></span></span></span><span class=\"mclose\">!</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"minner\">…</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mord\"><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"msupsub\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.1514em;\"><span class=\"\" style=\"top: -2.55em; margin-left: -0.0315em; margin-right: 0.05em;\"><span class=\"pstrut\" style=\"height: 2.7em;\"></span><span class=\"sizing reset-size6 size3 mtight\"><span class=\"mord mathnormal mtight\">m</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.15em;\"><span class=\"\"></span></span></span></span></span></span><span class=\"mclose\">!</span></span></span><span class=\"\" style=\"top: -3.23em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"frac-line\" style=\"border-bottom-width: 0.04em;\"></span></span><span class=\"\" style=\"top: -3.677em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord mathnormal\">n</span><span class=\"mclose\">!</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.836em;\"><span class=\"\"></span></span></span></span></span><span class=\"mclose nulldelimiter\"></span></span></span></span></span></span></span></p>\n<h2>🧩 Задача</h2>\n<blockquote>\n<p><strong>Умова:</strong> Скільки різних слів (у тому числі беззмістовних) можна скласти з літер слова <strong>\"МАТЕМАТИКА\"</strong>?</p>\n</blockquote>\n<p>Літери: М(2), А(3), Т(2), Е(1), И(1), К(1) — перевіримо суму: 2+3+2+1+1+1 = 10 ✓</p>\n<p>Якщо всі 10 літер були б різними, відповідь — 10! = 3 628 800. Але однакові літери при перестановці між собою не дають нових слів, тому ділимо:</p>\n<p><span><span class=\"katex-display\"><span class=\"katex\"><span class=\"katex-mathml\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><mi>P</mi><mo stretchy=\"false\">(</mo><mn>10</mn><mo separator=\"true\">;</mo><mo separator=\"true\">,</mo><mn>2</mn><mo separator=\"true\">,</mo><mn>3</mn><mo separator=\"true\">,</mo><mn>2</mn><mo stretchy=\"false\">)</mo><mo>=</mo><mfrac><mrow><mn>10</mn><mo stretchy=\"false\">!</mo></mrow><mrow><mn>2</mn><mo stretchy=\"false\">!</mo><mo>⋅</mo><mn>3</mn><mo stretchy=\"false\">!</mo><mo>⋅</mo><mn>2</mn><mo stretchy=\"false\">!</mo></mrow></mfrac><mo>=</mo><mfrac><mrow><mn>3</mn><mo separator=\"true\">,</mo><mn>628</mn><mo separator=\"true\">,</mo><mn>800</mn></mrow><mrow><mn>2</mn><mo>⋅</mo><mn>6</mn><mo>⋅</mo><mn>2</mn></mrow></mfrac><mo>=</mo><mfrac><mrow><mn>3</mn><mo separator=\"true\">,</mo><mn>628</mn><mo separator=\"true\">,</mo><mn>800</mn></mrow><mn>24</mn></mfrac><mo>=</mo><mn>151</mn><mo separator=\"true\">,</mo><mn>200</mn><mtext>&nbsp;слів</mtext></mrow><annotation encoding=\"application/x-tex\">P(10;, 2, 3, 2) = \\frac{10!}{2! \\cdot 3! \\cdot 2!} = \\frac{3,628,800}{2 \\cdot 6 \\cdot 2} = \\frac{3,628,800}{24} = 151,200 \\text{ слів}</annotation></semantics></math></span><span class=\"katex-html\" aria-hidden=\"true\"><span class=\"base\"><span class=\"strut\" style=\"height: 1em; vertical-align: -0.25em;\"></span><span class=\"mord mathnormal\" style=\"margin-right: 0.1389em;\">P</span><span class=\"mopen\">(</span><span class=\"mord\">10</span><span class=\"mpunct\">;,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord\">2</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord\">3</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord\">2</span><span class=\"mclose\">)</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 2.0574em; vertical-align: -0.686em;\"></span><span class=\"mord\"><span class=\"mopen nulldelimiter\"></span><span class=\"mfrac\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 1.3714em;\"><span class=\"\" style=\"top: -2.314em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">2</span><span class=\"mclose\">!</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mord\">3</span><span class=\"mclose\">!</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mord\">2</span><span class=\"mclose\">!</span></span></span><span class=\"\" style=\"top: -3.23em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"frac-line\" style=\"border-bottom-width: 0.04em;\"></span></span><span class=\"\" style=\"top: -3.677em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">10</span><span class=\"mclose\">!</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.686em;\"><span class=\"\"></span></span></span></span></span><span class=\"mclose nulldelimiter\"></span></span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 2.0074em; vertical-align: -0.686em;\"></span><span class=\"mord\"><span class=\"mopen nulldelimiter\"></span><span class=\"mfrac\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 1.3214em;\"><span class=\"\" style=\"top: -2.314em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">2</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mord\">6</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mord\">2</span></span></span><span class=\"\" style=\"top: -3.23em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"frac-line\" style=\"border-bottom-width: 0.04em;\"></span></span><span class=\"\" style=\"top: -3.677em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">3</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord\">628</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord\">800</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.686em;\"><span class=\"\"></span></span></span></span></span><span class=\"mclose nulldelimiter\"></span></span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 2.0074em; vertical-align: -0.686em;\"></span><span class=\"mord\"><span class=\"mopen nulldelimiter\"></span><span class=\"mfrac\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 1.3214em;\"><span class=\"\" style=\"top: -2.314em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">24</span></span></span><span class=\"\" style=\"top: -3.23em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"frac-line\" style=\"border-bottom-width: 0.04em;\"></span></span><span class=\"\" style=\"top: -3.677em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">3</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord\">628</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord\">800</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.686em;\"><span class=\"\"></span></span></span></span></span><span class=\"mclose nulldelimiter\"></span></span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 0.8778em; vertical-align: -0.1944em;\"></span><span class=\"mord\">151</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord\">200</span><span class=\"mord text\"><span class=\"mord\">&nbsp;</span><span class=\"mord cyrillic_fallback\">слів</span></span></span></span></span></span></span></p>\n<div class=\"note\"><strong>📝 Чому ділимо лише на три факторіали?</strong> <p>Одиночні літери Е, И, К мають k=1, і 1!=1, тому їх можна не писати у знаменнику — вони нічого не змінюють.</p>\n</div>\n\n\n\n\n\n<div class=\"warning\"><strong>⚠️ Типова помилка</strong> <p>Легко забути врахувати <strong>всі</strong> групи однакових елементів. Завжди виписуйте кожен унікальний символ і його кількість перед обчисленням.</p>\n</div>\n\n","<h1>📍 Розміщення без повторень</h1>\n<h2>📖 Теорія</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Розміщення без повторень</strong> A(n, k) — це вибір <strong>k елементів</strong> з n різних і їх <strong>впорядкування</strong> (порядок важливий, кожен елемент використовується не більше одного разу).</p>\n</div>\n\n\n\n<p><strong>Відмінність від перестановки:</strong> У перестановці беруть <strong>усі</strong> n елементів. У розміщенні — лише <strong>k</strong> з n (k ≤ n), і порядок має значення.</p>\n<p><strong>Чому формула виглядає саме так?</strong></p>\n<ul>\n<li>На <strong>1-ше місце</strong> — n варіантів</li>\n<li>На <strong>2-ге місце</strong> — (n−1) варіантів</li>\n<li>...</li>\n<li>На <strong>k-те місце</strong> — (n−k+1) варіантів</li>\n</ul>\n<p>Це рівно перші k множників факторіалу n:</p>\n<p><span><span class=\"katex-display\"><span class=\"katex\"><span class=\"katex-mathml\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><mi>A</mi><mo stretchy=\"false\">(</mo><mi>n</mi><mo separator=\"true\">,</mo><mi>k</mi><mo stretchy=\"false\">)</mo><mo>=</mo><mi>n</mi><mo>⋅</mo><mo stretchy=\"false\">(</mo><mi>n</mi><mo>−</mo><mn>1</mn><mo stretchy=\"false\">)</mo><mo>⋅</mo><mo>…</mo><mo>⋅</mo><mo stretchy=\"false\">(</mo><mi>n</mi><mo>−</mo><mi>k</mi><mo>+</mo><mn>1</mn><mo stretchy=\"false\">)</mo><mo>=</mo><mfrac><mrow><mi>n</mi><mo stretchy=\"false\">!</mo></mrow><mrow><mo stretchy=\"false\">(</mo><mi>n</mi><mo>−</mo><mi>k</mi><mo stretchy=\"false\">)</mo><mo stretchy=\"false\">!</mo></mrow></mfrac></mrow><annotation encoding=\"application/x-tex\">A(n, k) = n \\cdot (n-1) \\cdot \\ldots \\cdot (n-k+1) = \\frac{n!}{(n-k)!}</annotation></semantics></math></span><span class=\"katex-html\" aria-hidden=\"true\"><span class=\"base\"><span class=\"strut\" style=\"height: 1em; vertical-align: -0.25em;\"></span><span class=\"mord mathnormal\">A</span><span class=\"mopen\">(</span><span class=\"mord mathnormal\">n</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"mclose\">)</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 0.4445em;\"></span><span class=\"mord mathnormal\">n</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 1em; vertical-align: -0.25em;\"></span><span class=\"mopen\">(</span><span class=\"mord mathnormal\">n</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">−</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 1em; vertical-align: -0.25em;\"></span><span class=\"mord\">1</span><span class=\"mclose\">)</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 0.4445em;\"></span><span class=\"minner\">…</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 1em; vertical-align: -0.25em;\"></span><span class=\"mopen\">(</span><span class=\"mord mathnormal\">n</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">−</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 0.7778em; vertical-align: -0.0833em;\"></span><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">+</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 1em; vertical-align: -0.25em;\"></span><span class=\"mord\">1</span><span class=\"mclose\">)</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 2.3074em; vertical-align: -0.936em;\"></span><span class=\"mord\"><span class=\"mopen nulldelimiter\"></span><span class=\"mfrac\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 1.3714em;\"><span class=\"\" style=\"top: -2.314em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mopen\">(</span><span class=\"mord mathnormal\">n</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">−</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"mclose\">)!</span></span></span><span class=\"\" style=\"top: -3.23em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"frac-line\" style=\"border-bottom-width: 0.04em;\"></span></span><span class=\"\" style=\"top: -3.677em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord mathnormal\">n</span><span class=\"mclose\">!</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.936em;\"><span class=\"\"></span></span></span></span></span><span class=\"mclose nulldelimiter\"></span></span></span></span></span></span></span></p>\n<h2>🧩 Задача</h2>\n<blockquote>\n<p><strong>Умова:</strong> На змаганнях з плавання беруть участь <strong>8 спортсменів</strong>. Скількома способами можна розподілити <strong>3 призових місця</strong> (золото, срібло, бронза)?</p>\n</blockquote>\n<p><strong>Розв'язання:</strong></p>\n<p>Порядок важливий (1-ше місце ≠ 2-ге місце), кожен спортсмен отримує не більше однієї медалі — це розміщення без повторень:</p>\n<p><span><span class=\"katex-display\"><span class=\"katex\"><span class=\"katex-mathml\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><mi>A</mi><mo stretchy=\"false\">(</mo><mn>8</mn><mo separator=\"true\">,</mo><mn>3</mn><mo stretchy=\"false\">)</mo><mo>=</mo><mfrac><mrow><mn>8</mn><mo stretchy=\"false\">!</mo></mrow><mrow><mo stretchy=\"false\">(</mo><mn>8</mn><mo>−</mo><mn>3</mn><mo stretchy=\"false\">)</mo><mo stretchy=\"false\">!</mo></mrow></mfrac><mo>=</mo><mfrac><mrow><mn>8</mn><mo stretchy=\"false\">!</mo></mrow><mrow><mn>5</mn><mo stretchy=\"false\">!</mo></mrow></mfrac><mo>=</mo><mn>8</mn><mo>⋅</mo><mn>7</mn><mo>⋅</mo><mn>6</mn><mo>=</mo><mn>336</mn><mtext>&nbsp;варіантів</mtext></mrow><annotation encoding=\"application/x-tex\">A(8, 3) = \\frac{8!}{(8-3)!} = \\frac{8!}{5!} = 8 \\cdot 7 \\cdot 6 = 336 \\text{ варіантів}</annotation></semantics></math></span><span class=\"katex-html\" aria-hidden=\"true\"><span class=\"base\"><span class=\"strut\" style=\"height: 1em; vertical-align: -0.25em;\"></span><span class=\"mord mathnormal\">A</span><span class=\"mopen\">(</span><span class=\"mord\">8</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord\">3</span><span class=\"mclose\">)</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 2.3074em; vertical-align: -0.936em;\"></span><span class=\"mord\"><span class=\"mopen nulldelimiter\"></span><span class=\"mfrac\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 1.3714em;\"><span class=\"\" style=\"top: -2.314em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mopen\">(</span><span class=\"mord\">8</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">−</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mord\">3</span><span class=\"mclose\">)!</span></span></span><span class=\"\" style=\"top: -3.23em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"frac-line\" style=\"border-bottom-width: 0.04em;\"></span></span><span class=\"\" style=\"top: -3.677em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">8</span><span class=\"mclose\">!</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.936em;\"><span class=\"\"></span></span></span></span></span><span class=\"mclose nulldelimiter\"></span></span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 2.0574em; vertical-align: -0.686em;\"></span><span class=\"mord\"><span class=\"mopen nulldelimiter\"></span><span class=\"mfrac\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 1.3714em;\"><span class=\"\" style=\"top: -2.314em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">5</span><span class=\"mclose\">!</span></span></span><span class=\"\" style=\"top: -3.23em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"frac-line\" style=\"border-bottom-width: 0.04em;\"></span></span><span class=\"\" style=\"top: -3.677em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">8</span><span class=\"mclose\">!</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.686em;\"><span class=\"\"></span></span></span></span></span><span class=\"mclose nulldelimiter\"></span></span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 0.6444em;\"></span><span class=\"mord\">8</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 0.6444em;\"></span><span class=\"mord\">7</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 0.6444em;\"></span><span class=\"mord\">6</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 0.8778em; vertical-align: -0.1944em;\"></span><span class=\"mord\">336</span><span class=\"mord text\"><span class=\"mord\">&nbsp;</span><span class=\"mord cyrillic_fallback\">варіантів</span></span></span></span></span></span></span></p>\n<p><strong>Підказка:</strong> 8! та 5! скорочуються — залишаються лише перші k=3 множники зверху: 8 · 7 · 6.</p>\n","<h1>♻️ Розміщення з повтореннями</h1>\n<h2>📖 Теорія</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Розміщення з повтореннями</strong> Ā(n, k) — це вибір <strong>k позицій</strong> з n елементів, де <strong>один елемент може використовуватися кілька разів</strong> (порядок важливий).</p>\n</div>\n\n\n\n<p><strong>Чому формула — це nᵏ?</strong></p>\n<p>На <strong>кожну</strong> з k позицій незалежно можна поставити будь-який з n елементів. За правилом добутку: n · n · n · ... (k разів) = nᵏ.</p>\n<p><span><span class=\"katex-display\"><span class=\"katex\"><span class=\"katex-mathml\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><mover accent=\"true\"><mi>A</mi><mo>ˉ</mo></mover><mo stretchy=\"false\">(</mo><mi>n</mi><mo separator=\"true\">,</mo><mi>k</mi><mo stretchy=\"false\">)</mo><mo>=</mo><msup><mi>n</mi><mi>k</mi></msup></mrow><annotation encoding=\"application/x-tex\">\\bar{A}(n, k) = n^k</annotation></semantics></math></span><span class=\"katex-html\" aria-hidden=\"true\"><span class=\"base\"><span class=\"strut\" style=\"height: 1.0701em; vertical-align: -0.25em;\"></span><span class=\"mord accent\"><span class=\"vlist-t\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.8201em;\"><span class=\"\" style=\"top: -3em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord mathnormal\">A</span></span><span class=\"\" style=\"top: -3.2523em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"accent-body\" style=\"left: -0.1111em;\"><span class=\"mord\">ˉ</span></span></span></span></span></span></span><span class=\"mopen\">(</span><span class=\"mord mathnormal\">n</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"mclose\">)</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 0.8991em;\"></span><span class=\"mord\"><span class=\"mord mathnormal\">n</span><span class=\"msupsub\"><span class=\"vlist-t\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.8991em;\"><span class=\"\" style=\"top: -3.113em; margin-right: 0.05em;\"><span class=\"pstrut\" style=\"height: 2.7em;\"></span><span class=\"sizing reset-size6 size3 mtight\"><span class=\"mord mathnormal mtight\" style=\"margin-right: 0.0315em;\">k</span></span></span></span></span></span></span></span></span></span></span></span></span></p>\n<div class=\"tip\"><strong>💡 Аналогія</strong> <p>Це як генерація рядків фіксованої довжини k над алфавітом розміром n — наприклад, PIN-коди, паролі, бінарні рядки.</p>\n</div>\n\n\n\n<h2>🧩 Задача</h2>\n<blockquote>\n<p><strong>Умова:</strong> PIN-код банківської картки складається з <strong>4 цифр</strong> (від 0 до 9), причому цифри можуть повторюватись. Скільки різних PIN-кодів існує?</p>\n</blockquote>\n<p><strong>Розв'язання:</strong></p>\n<p>n = 10 (цифри 0–9), k = 4 (довжина коду), повторення дозволені:</p>\n<p><span><span class=\"katex-display\"><span class=\"katex\"><span class=\"katex-mathml\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><mover accent=\"true\"><mi>A</mi><mo>ˉ</mo></mover><mo stretchy=\"false\">(</mo><mn>10</mn><mo separator=\"true\">,</mo><mn>4</mn><mo stretchy=\"false\">)</mo><mo>=</mo><mn>1</mn><msup><mn>0</mn><mn>4</mn></msup><mo>=</mo><mn>10000</mn><mtext>&nbsp;PIN-кодів</mtext></mrow><annotation encoding=\"application/x-tex\">\\bar{A}(10, 4) = 10^4 = 10000 \\text{ PIN-кодів}</annotation></semantics></math></span><span class=\"katex-html\" aria-hidden=\"true\"><span class=\"base\"><span class=\"strut\" style=\"height: 1.0701em; vertical-align: -0.25em;\"></span><span class=\"mord accent\"><span class=\"vlist-t\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.8201em;\"><span class=\"\" style=\"top: -3em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord mathnormal\">A</span></span><span class=\"\" style=\"top: -3.2523em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"accent-body\" style=\"left: -0.1111em;\"><span class=\"mord\">ˉ</span></span></span></span></span></span></span><span class=\"mopen\">(</span><span class=\"mord\">10</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord\">4</span><span class=\"mclose\">)</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 0.8641em;\"></span><span class=\"mord\">1</span><span class=\"mord\"><span class=\"mord\">0</span><span class=\"msupsub\"><span class=\"vlist-t\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.8641em;\"><span class=\"\" style=\"top: -3.113em; margin-right: 0.05em;\"><span class=\"pstrut\" style=\"height: 2.7em;\"></span><span class=\"sizing reset-size6 size3 mtight\"><span class=\"mord mtight\">4</span></span></span></span></span></span></span></span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 0.8778em; vertical-align: -0.1944em;\"></span><span class=\"mord\">10000</span><span class=\"mord text\"><span class=\"mord\">&nbsp;PIN-</span><span class=\"mord cyrillic_fallback\">кодів</span></span></span></span></span></span></span></p>\n<blockquote>\n<p><strong>Бонус:</strong> А якщо цифри <strong>не можуть</strong> повторюватись? Тоді це розміщення <strong>без</strong> повторень: A(10, 4) = 10 · 9 · 8 · 7 = 5040 — майже вдвічі менше від 10 000!</p>\n</blockquote>\n","<h1>🎯 Комбінації без повторень</h1>\n<h2>📖 Теорія</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Комбінація без повторень</strong> C(n, k) — це вибір <strong>k елементів</strong> з n різних, де <strong>порядок не важливий</strong> і кожен елемент використовується не більше одного разу.</p>\n</div>\n\n\n\n<p><strong>Відмінність від розміщення:</strong> Розміщення {A, B} ≠ {B, A}, а комбінація {A, B} = {B, A} — це одна й та сама підмножина.</p>\n<p><strong>Звідки формула?</strong></p>\n<p>Кожна комбінація k елементів — це одна підмножина. Але якщо ми рахуємо розміщення A(n,k), то кожну таку підмножину з k елементів ми враховуємо <strong>k!</strong> разів (усі перестановки всередині). Щоб позбутись цього «перерахунку», ділимо:</p>\n<p><span><span class=\"katex-display\"><span class=\"katex\"><span class=\"katex-mathml\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><mi>C</mi><mo stretchy=\"false\">(</mo><mi>n</mi><mo separator=\"true\">,</mo><mi>k</mi><mo stretchy=\"false\">)</mo><mo>=</mo><mrow><mo fence=\"true\">(</mo><mfrac linethickness=\"0px\"><mi>n</mi><mi>k</mi></mfrac><mo fence=\"true\">)</mo></mrow><mo>=</mo><mfrac><mrow><mi>A</mi><mo stretchy=\"false\">(</mo><mi>n</mi><mo separator=\"true\">,</mo><mi>k</mi><mo stretchy=\"false\">)</mo></mrow><mrow><mi>k</mi><mo stretchy=\"false\">!</mo></mrow></mfrac><mo>=</mo><mfrac><mrow><mi>n</mi><mo stretchy=\"false\">!</mo></mrow><mrow><mi>k</mi><mo stretchy=\"false\">!</mo><mo>⋅</mo><mo stretchy=\"false\">(</mo><mi>n</mi><mo>−</mo><mi>k</mi><mo stretchy=\"false\">)</mo><mo stretchy=\"false\">!</mo></mrow></mfrac></mrow><annotation encoding=\"application/x-tex\">C(n, k) = \\binom{n}{k} = \\frac{A(n,k)}{k!} = \\frac{n!}{k! \\cdot (n-k)!}</annotation></semantics></math></span><span class=\"katex-html\" aria-hidden=\"true\"><span class=\"base\"><span class=\"strut\" style=\"height: 1em; vertical-align: -0.25em;\"></span><span class=\"mord mathnormal\" style=\"margin-right: 0.0715em;\">C</span><span class=\"mopen\">(</span><span class=\"mord mathnormal\">n</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"mclose\">)</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 2.4em; vertical-align: -0.95em;\"></span><span class=\"mord\"><span class=\"mopen delimcenter\" style=\"top: 0em;\"><span class=\"delimsizing size3\">(</span></span><span class=\"mfrac\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 1.1076em;\"><span class=\"\" style=\"top: -2.314em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span></span></span><span class=\"\" style=\"top: -3.677em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord mathnormal\">n</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.686em;\"><span class=\"\"></span></span></span></span></span><span class=\"mclose delimcenter\" style=\"top: 0em;\"><span class=\"delimsizing size3\">)</span></span></span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 2.113em; vertical-align: -0.686em;\"></span><span class=\"mord\"><span class=\"mopen nulldelimiter\"></span><span class=\"mfrac\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 1.427em;\"><span class=\"\" style=\"top: -2.314em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"mclose\">!</span></span></span><span class=\"\" style=\"top: -3.23em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"frac-line\" style=\"border-bottom-width: 0.04em;\"></span></span><span class=\"\" style=\"top: -3.677em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord mathnormal\">A</span><span class=\"mopen\">(</span><span class=\"mord mathnormal\">n</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"mclose\">)</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.686em;\"><span class=\"\"></span></span></span></span></span><span class=\"mclose nulldelimiter\"></span></span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 2.3074em; vertical-align: -0.936em;\"></span><span class=\"mord\"><span class=\"mopen nulldelimiter\"></span><span class=\"mfrac\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 1.3714em;\"><span class=\"\" style=\"top: -2.314em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"mclose\">!</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mopen\">(</span><span class=\"mord mathnormal\">n</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">−</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"mclose\">)!</span></span></span><span class=\"\" style=\"top: -3.23em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"frac-line\" style=\"border-bottom-width: 0.04em;\"></span></span><span class=\"\" style=\"top: -3.677em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord mathnormal\">n</span><span class=\"mclose\">!</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.936em;\"><span class=\"\"></span></span></span></span></span><span class=\"mclose nulldelimiter\"></span></span></span></span></span></span></span></p>\n<div class=\"note\"><strong>📝 Символ</strong> <p>C(n, k) також записується як <strong>C ⁿₖ</strong> або <strong>\"n вибрати k\"</strong> і називається <strong>біноміальним коефіцієнтом</strong>.</p>\n</div>\n\n\n\n<h2>🧩 Задача</h2>\n<blockquote>\n<p><strong>Умова:</strong> У групі <strong>10 студентів</strong> потрібно обрати <strong>3 осіб</strong> для участі в олімпіаді. Порядок вибору не має значення. Скільки різних груп можна сформувати?</p>\n</blockquote>\n<p><strong>Розв'язання:</strong></p>\n<p>n = 10, k = 3, порядок не важливий — комбінація без повторень:</p>\n<p><span><span class=\"katex-display\"><span class=\"katex\"><span class=\"katex-mathml\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><mi>C</mi><mo stretchy=\"false\">(</mo><mn>10</mn><mo separator=\"true\">,</mo><mn>3</mn><mo stretchy=\"false\">)</mo><mo>=</mo><mfrac><mrow><mn>10</mn><mo stretchy=\"false\">!</mo></mrow><mrow><mn>3</mn><mo stretchy=\"false\">!</mo><mo>⋅</mo><mn>7</mn><mo stretchy=\"false\">!</mo></mrow></mfrac><mo>=</mo><mfrac><mrow><mn>10</mn><mo>⋅</mo><mn>9</mn><mo>⋅</mo><mn>8</mn></mrow><mrow><mn>3</mn><mo>⋅</mo><mn>2</mn><mo>⋅</mo><mn>1</mn></mrow></mfrac><mo>=</mo><mfrac><mn>720</mn><mn>6</mn></mfrac><mo>=</mo><mn>120</mn><mtext>&nbsp;груп</mtext></mrow><annotation encoding=\"application/x-tex\">C(10, 3) = \\frac{10!}{3! \\cdot 7!} = \\frac{10 \\cdot 9 \\cdot 8}{3 \\cdot 2 \\cdot 1} = \\frac{720}{6} = 120 \\text{ груп}</annotation></semantics></math></span><span class=\"katex-html\" aria-hidden=\"true\"><span class=\"base\"><span class=\"strut\" style=\"height: 1em; vertical-align: -0.25em;\"></span><span class=\"mord mathnormal\" style=\"margin-right: 0.0715em;\">C</span><span class=\"mopen\">(</span><span class=\"mord\">10</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord\">3</span><span class=\"mclose\">)</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 2.0574em; vertical-align: -0.686em;\"></span><span class=\"mord\"><span class=\"mopen nulldelimiter\"></span><span class=\"mfrac\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 1.3714em;\"><span class=\"\" style=\"top: -2.314em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">3</span><span class=\"mclose\">!</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mord\">7</span><span class=\"mclose\">!</span></span></span><span class=\"\" style=\"top: -3.23em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"frac-line\" style=\"border-bottom-width: 0.04em;\"></span></span><span class=\"\" style=\"top: -3.677em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">10</span><span class=\"mclose\">!</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.686em;\"><span class=\"\"></span></span></span></span></span><span class=\"mclose nulldelimiter\"></span></span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 2.0074em; vertical-align: -0.686em;\"></span><span class=\"mord\"><span class=\"mopen nulldelimiter\"></span><span class=\"mfrac\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 1.3214em;\"><span class=\"\" style=\"top: -2.314em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">3</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mord\">2</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mord\">1</span></span></span><span class=\"\" style=\"top: -3.23em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"frac-line\" style=\"border-bottom-width: 0.04em;\"></span></span><span class=\"\" style=\"top: -3.677em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">10</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mord\">9</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mbin\">⋅</span><span class=\"mspace\" style=\"margin-right: 0.2222em;\"></span><span class=\"mord\">8</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.686em;\"><span class=\"\"></span></span></span></span></span><span class=\"mclose nulldelimiter\"></span></span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 2.0074em; vertical-align: -0.686em;\"></span><span class=\"mord\"><span class=\"mopen nulldelimiter\"></span><span class=\"mfrac\"><span class=\"vlist-t vlist-t2\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 1.3214em;\"><span class=\"\" style=\"top: -2.314em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">6</span></span></span><span class=\"\" style=\"top: -3.23em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"frac-line\" style=\"border-bottom-width: 0.04em;\"></span></span><span class=\"\" style=\"top: -3.677em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord\"><span class=\"mord\">720</span></span></span></span><span class=\"vlist-s\">​</span></span><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.686em;\"><span class=\"\"></span></span></span></span></span><span class=\"mclose nulldelimiter\"></span></span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 0.8389em; vertical-align: -0.1944em;\"></span><span class=\"mord\">120</span><span class=\"mord text\"><span class=\"mord\">&nbsp;</span><span class=\"mord cyrillic_fallback\">груп</span></span></span></span></span></span></span></p>\n<p><strong>Підказка для обчислення:</strong> Чисельник — перші k множників з n (зверху вниз), знаменник — k!. Скорочуйте до обчислення повних факторіалів — тут 10!/7! = 10·9·8, і ділимо на 3! = 6.</p>\n","<h1>🔄 Комбінації з повтореннями</h1>\n<h2>📖 Теорія</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Комбінація з повтореннями</strong> C̄(n, k) — це вибір <strong>k елементів</strong> з n типів, де <strong>порядок не важливий</strong>, але <strong>один тип може зустрічатись кілька разів</strong>.</p>\n</div>\n\n\n\n<p><strong>Чому формула саме така?</strong></p>\n<p>Задача еквівалентна такій: розмістити k куль у n ящиків. Уявімо n ящиків, розділених (n−1) перегородками. Разом маємо k куль + (n−1) перегородок = k + n − 1 символів. Нам потрібно обрати місця для k куль серед k + n − 1 позицій (або, еквівалентно, місця для n−1 перегородок):</p>\n<p><span><span class=\"katex-display\"><span class=\"katex\"><span class=\"katex-mathml\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\" display=\"block\"><semantics><mrow><mover accent=\"true\"><mi>C</mi><mo>ˉ</mo></mover><mo stretchy=\"false\">(</mo><mi>n</mi><mo separator=\"true\">,</mo><mi>k</mi><mo stretchy=\"false\">)</mo><mo>=</mo><mrow><mo fence=\"true\">(</mo><mfrac linethickness=\"0px\"><mrow><mi>n</mi><mo>+</mo><mi>k</mi><mo>−</mo><mn>1</mn></mrow><mi>k</mi></mfrac><mo fence=\"true\">)</mo></mrow><mo>=</mo><mfrac><mrow><mo stretchy=\"false\">(</mo><mi>n</mi><mo>+</mo><mi>k</mi><mo>−</mo><mn>1</mn><mo stretchy=\"false\">)</mo><mo stretchy=\"false\">!</mo></mrow><mrow><mi>k</mi><mo stretchy=\"false\">!</mo><mo>⋅</mo><mo stretchy=\"false\">(</mo><mi>n</mi><mo>−</mo><mn>1</mn><mo stretchy=\"false\">)</mo><mo stretchy=\"false\">!</mo></mrow></mfrac></mrow><annotation encoding=\"application/x-tex\">\\bar{C}(n, k) = \\binom{n+k-1}{k} = \\frac{(n+k-1)!}{k! \\cdot (n-1)!}</annotation></semantics></math></span><span class=\"katex-html\" aria-hidden=\"true\"><span class=\"base\"><span class=\"strut\" style=\"height: 1.0701em; vertical-align: -0.25em;\"></span><span class=\"mord accent\"><span class=\"vlist-t\"><span class=\"vlist-r\"><span class=\"vlist\" style=\"height: 0.8201em;\"><span class=\"\" style=\"top: -3em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"mord mathnormal\" style=\"margin-right: 0.0715em;\">C</span></span><span class=\"\" style=\"top: -3.2523em;\"><span class=\"pstrut\" style=\"height: 3em;\"></span><span class=\"accent-body\" style=\"left: -0.1667em;\"><span class=\"mord\">ˉ</span></span></span></span></span></span></span><span class=\"mopen\">(</span><span class=\"mord mathnormal\">n</span><span class=\"mpunct\">,</span><span class=\"mspace\" style=\"margin-right: 0.1667em;\"></span><span class=\"mord mathnormal\" style=\"margin-right: 0.0315em;\">k</span><span class=\"mclose\">)</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span><span class=\"mrel\">=</span><span class=\"mspace\" style=\"margin-right: 0.2778em;\"></span></span><span class=\"base\"><span class=\"strut\" style=\"height: 2.4em; vertical-align: -0.95em;\"></span><span class=\"mord\"><span class=\"mopen delimcenter\" style=\"top: 0em;\"><s -height: 1.5; max-width: 200px; text-align: center; width: 200px;\"><span class=\"nodeLabel \"><p>Перестановка з повтореннями</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<table>\n<thead>\n<tr>\n<th>Конфігурація</th>\n<th>Повторення</th>\n<th>Порядок</th>\n<th>Формула</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Перестановка</td>\n<td>Ні</td>\n<td>✅ Так</td>\n<td>n!</td>\n</tr>\n<tr>\n<td>Перестановка</td>\n<td>Так</td>\n<td>✅ Так</td>\n<td>n! / (k₁! · k₂! · ... · km!)</td>\n</tr>\n<tr>\n<td>Розміщення</td>\n<td>Ні</td>\n<td>✅ Так</td>\n<td>n! / (n−k)!</td>\n</tr>\n<tr>\n<td>Розміщення</td>\n<td>Так</td>\n<td>✅ Так</td>\n<td>nᵏ</td>\n</tr>\n<tr>\n<td>Комбінація</td>\n<td>Ні</td>\n<td>❌ Ні</td>\n<td>n! / (k! · (n−k)!)</td>\n</tr>\n<tr>\n<td>Комбінація</td>\n<td>Так</td>\n<td>❌ Ні</td>\n<td>(n+k−1)! / (k! · (n−1)!)</td>\n</tr>\n</tbody></table>\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми опрацювали:</strong></p>\n<ol>\n<li><p><strong>Правила підрахунку:</strong> правило суми (вибір АБО) та правило добутку (незалежні кроки) — основа будь-якого комбінаторного аналізу</p>\n</li>\n<li><p><strong>Перестановки</strong> — впорядкування всіх n елементів; при однакових елементах ділимо на факторіали кратних груп</p>\n</li>\n<li><p><strong>Розміщення</strong> — вибір k з n із урахуванням порядку; без повторень: n!/(n−k)!, з повтореннями: nᵏ</p>\n</li>\n<li><p><strong>Комбінації</strong> — вибір k з n без урахування порядку; без повторень: C(n,k), з повтореннями: C(n+k−1, k)</p>\n</li>\n<li><p><strong>Ключове запитання при розв'язанні задач:</strong> чи важливий порядок? чи допускаються повторення?</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 У чому різниця між розміщенням і комбінацією? Коли порядок має значення, а коли — ні?</p>\n</li>\n<li><p>🤔 Скільки різних слів можна скласти з літер слова <strong>\"РІВНЯННЯ\"</strong>?</p>\n</li>\n<li><p>🤔 На змаганнях беруть участь 7 спортсменів. Скількома способами можна розподілити 3 призових місця (золото, срібло, бронза)? А скількома — якщо потрібно просто оголосити трьох призерів без розподілу місць?</p>\n</li>\n<li><p>🤔 Чому 0! = 1? Що це означає з точки зору комбінаторики?</p>\n</li>\n<li><p>🤔 Скільки 3-значних чисел можна скласти з цифр 1, 2, 3, 4, 5, якщо цифри не повторюються? А якщо повторення дозволені?</p>\n</li>\n</ol>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
